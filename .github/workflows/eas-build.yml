name: EAS Build & Submit to TestFlight

on:
  push:
    branches: [main]

jobs:
  build-and-submit:
    name: Build iOS & Submit to TestFlight
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HelloWorldApp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: HelloWorldApp

      - name: Run tests before build
        run: npm test
        working-directory: HelloWorldApp

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS app and submit to TestFlight
        run: eas build --platform ios --profile production --auto-submit --non-interactive
        working-directory: HelloWorldApp
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
