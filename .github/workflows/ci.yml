name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HelloWorldApp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: HelloWorldApp

      - name: Run tests
        run: npm test
        working-directory: HelloWorldApp

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: HelloWorldApp
